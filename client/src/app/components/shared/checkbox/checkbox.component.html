<div class="flex gap-3 items-center">

        <span 
        tabindex="0"
    (click)="toggleCheckbox()"
    class="rounded transition duration-200 ease-linear h-4 w-4 focus:ring-2 hover:ring-2 ring-offset-2 ring-blue hover:ring-blue outline-none border border-slate-300 bg-white flex items-center justify-center"
  type="checkbox" [id]="id">
  @if (isChecked) {
      <svg
      class="scale-125"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      >
      <path
      d="M7.75 12L10.58 14.83L16.25 9.16998"
      stroke="#181CF9"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      />
    </svg>
}
</span>
<label (click)="toggleCheckbox()" [htmlFor]="id">
    {{ label }}
  </label>
</div>
