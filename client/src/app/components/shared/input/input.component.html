<div class="flex flex-col gap-2.5 relative">
  <div class="flex gap-2">
    <label [for]="id" class="text-primary capitalize">{{ label }}</label>
    @if (isRequired) {
    <span class="text-error text-xl">*</span>
    }
  </div>
  <input
    [id]="id"
    [type]="type"
    [formControl]="control"
    [autocomplete]="id"
    [class]="cn('rounded-lg transition duration-200 ease-linear h-12 pl-4 pr-10 focus:ring-2 hover:ring-2 ring-offset-2 ring-blue-B800 hover:ring-blue-B800 outline-none border border-white', 
    {
      ' ring-error ring-2 ring-offset-2 border-error hover:ring-error hover:border-error text-error':
        control.invalid && (control.touched || control.dirty)
    },
    className
    )"
    [placeholder]="placeholder"
  />
  @if (control.invalid && (control.touched || control.dirty)) {
  <span
    *ngFor="let err of control.errors | keyvalue"
    class="text-error font-medium text-xs -mt-1.5 absolute left-0 -bottom-6"
  >
    {{ getErrorMessages()[err.key] }}</span
  >
  }

  <span
    (click)="toggleIsShowPassword()"
    class="eye absolute right-3 cursor-pointer"                                             
  >
    @if (isPassword) {
    <klock-eye [showContent]="isShowPassword" />
    }
  </span>
</div>
