<aside
  class="bg-[#F9FAFB] border-r h-full hidden md:flex md:flex-col gap-2 justify-between md:w-[180px] lg:w-[254px] px-1.5 py-3 pb-4 border-[#D0D5DD]"
>
  <div class="flex flex-col gap-4 border-b-2 border-primary/50 h-full">
    <app-logo
      class="transform scale-75 cursor-pointer mx-auto"
      innerColor="#1D2939"
      outerColor="#FFFFFF"
      labelColor="#1D2939"
    />
    <div class="mt-4 flex flex-col gap-8">
      @for(item of sidebarItems; track item.id) {
      <app-button
        [isRipple]="true"
        [variant]="activeRoute === '/' + item.path ? 'primary' : 'secondary'"
        (buttonClick)="handleNavigateRoute(item.path)"
      >
        <div class="flex gap-4">
          <app-sidebar-icon
            [icon]="item.icon"
            [color]="activeRoute === '/' + item.path ? '#FFFFFF' : '#1D2939'"
          ></app-sidebar-icon>
          <span>{{ item.name }}</span>
        </div>
      </app-button>
      }
    </div>
  </div>

  <app-button [isRipple]="true" variant="secondary">
    <div class="flex gap-4">
      <app-sidebar-icon
        [icon]="'logout'"
        [color]="'#1D2939'"
      ></app-sidebar-icon>
      <span>Logout</span>
    </div>
  </app-button>
</aside>
