<section class="flex flex-col">
  <div class="container h-auto relative sm:hidden">
    <img src="assets/auth-bg.png" class="h-full w-full" alt="auth-bg" />
    <div
      class="absolute w-full h-full left-0 top-0 flex flex-col gap-4 sm:gap-8 justify-center items-center z-10"
    >
      <app-logo
        innerColor="#FFFFFF"
        outerColor="#1D2939"
        labelColor="#FFFFFF"
      />
      <h4 class="login-sigup-label">{{ isSignUp ? "sign up" : "sign in" }}</h4>
    </div>
  </div>
  <div
    class="py-8 px-[5vw] sm:flex sm:items-center sm:justify-center sm:h-screen"
  >
    <form
      class="bg-[#FBFBFB] rounded-lg flex flex-col gap-8 py-6 w-full sm:w-[30rem] md:w-[33rem]"
      [formGroup]="userAuthForm"
      (submit)="onSubmit($event)"
    >
      <div
        class="w-full h-full left-0 top-0 hidden sm:flex flex-col gap-8 justify-center items-center"
      >
        <app-logo
          innerColor="#1D2939"
          outerColor="#FFFFFF"
          labelColor="#1D2939"
        />
        <h4 class="login-sigup-label">
          {{ isSignUp ? "sign up" : "sign in" }}
        </h4>
      </div>
      <div class="flex flex-col gap-8 max-h-[38vh] overflow-y-auto px-4 sm:px-8 md:px-10">

      @if (isSignUp) {
      <app-input
        id="name"
        placeholder="Enter your full name"
        label="name"
        [control]="userAuthForm.controls.name"
      />
      }

      <app-input
        id="email"
        placeholder="Enter your email"
        label="email"
        type="email"
        [control]="userAuthForm.controls.email"
        />

      <app-input
        id="password"
        label="password"
        placeholder="Enter your password"
        type="password"
        [control]="userAuthForm.controls.password"
        [isPassword]="true"
      />

      @if (isSignUp) {
      <app-input
        id="confirm-password"
        label="confirm password"
        placeholder="Confirm password"
        type="password"
        [control]="userAuthForm.controls.confirmPassword"
        [isPassword]="true"
        [mismatch]="userAuthForm.controls.password"
        />
      }

      <div class="flex gap-1">
        <app-checkbox
        id="terms"
        [label]="isSignUp ? 'I agree the' : 'Remember Me'"
        [control]="isSignUp ? userAuthForm.controls.termsAndConditions : userAuthForm.controls.rememberMe"
        [isRequired]="isSignUp"
        />
        @if (isSignUp) {
          <a [routerLink]="['/terms-and-conditions']" target="_blank" class="text-blue hover:underline transition-all duration-200 ease-linear">Terms and conditions</a>
        }
      </div>
    </div>

    <div class="px-4 sm:px-8 md:px-10">
      <button
      type="submit"
      [disabled]="isSubmitting || userAuthForm.invalid"
      class="rounded-lg bg-[#1D2939] h-12 font-semibold text-white w-full uppercase flex items-center justify-center gap-4 disabled:bg-[#294468] hover:opacity-90 transition-all duration-300 ease-linear disabled:hover:opacity-100"
      >
      @if (isSubmitting) {
        
      } @if (isSubmitting) {
        <span>Submitting...</span>
      } @else {
        <span>
          {{ isSignUp ? "sign up" : "sign in" }}
        </span>
      }
    </button>
  </div>
    
      <div class="flex items-center justify-center gap-1 text-sm">
        <span>{{
          isSignUp ? "Alredy have an account?" : "Don’t have an account?"
        }}</span>
        <a [routerLink]="isSignUp ? '/sign-in' : '/sign-up'" class="link">{{
          isSignUp ? "Sign In" : "Sign Up"
        }}</a>
      </div>
    </form>
  </div>
</section>
