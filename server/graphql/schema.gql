enum Role {
	ADMIN
	USER
}

scalar Time

type Token {
	value: String!
	expiration: Int!
}

type User {
	name: String!
	email: String!
	userID: String!
	role: Role!
	password: String!
	rememberMe: Boolean
	provider: String
	photo: String
	phone: String
	location: String
	gender: String
	createdAt: Time!
	updatedAt: Time!
}

type UserProfile {
	name: String
	email: String
	userID: String
	role: Role
	photo: String
	phone: String
	location: String
	gender: String
}

type UserAuthResponse {
	message: String!
	user: UserProfile
	token: TokenResponse
}

type TokenResponse {
  accessToken: Token!
  refreshToken: Token!
}

type Query {
	Users: [UserProfile]
	User(UserID: String!): UserProfile!
}

type Mutation {
	CreateUser(input: CreateNewUser!): UserAuthResponse!
	LoginUser(input: LoginUser!): UserAuthResponse!
	UpdateUser(UserID: String!, input: UpdateUser!): UserAuthResponse!
	DeleteUser(UserID: String!): UserAuthResponse!
}

input CreateNewUser {
	name: String!
	email: String!
	password: String!
	role: Role
}

input LoginUser {
	email: String!
	password: String!
	rememberMe: Boolean
}

input UpdateUser {
	name: String
	email: String
	password: String
	photo: String
	phone: String
	location: String
	gender: String
}
