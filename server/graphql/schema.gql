type Token {
	value: String!
	expiration: Int!
}

type User {
	name: String!
	email: String!
	userID: String!
	role: String!
	password: String!
	rememberMe: Boolean
	provider: String
	photo: String
	phone: String
	location: String
	gender: String
}

type UserProfile {
	name: String
	email: String
	userID: String
	role: String
	photo: String
	phone: String
	location: String
	gender: String
}

type UserAuthResponse {
	success: Boolean!
	message: String!
	user: UserProfile
	token: TokenResponse
}

type TokenResponse {
  accessToken: Token!
  refreshToken: Token!
}

type Query {
	Users: [UserProfile]
	User(UserID: String!): UserProfile!
}

type Mutation {
	CreateUser(input: CreateNewUser!): UserAuthResponse!
	UpdateUser(UserID: String!, input: UpdateUser!): User!
	DeleteUser(UserID: String!): UserAuthResponse!
}

input CreateNewUser {
	name: String!
	email: String!
	password: String!
	role: String
}

input UpdateUser {
	name: String
	email: String
	password: String
	role: String
	photo: String
	phone: String
	location: String
	gender: String
}
